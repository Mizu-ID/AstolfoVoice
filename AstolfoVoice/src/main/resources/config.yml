# =====================================================================
# AstolfoVoice - Konfigurasi Server
# Fork kompatibel protokol Simple Voice Chat (GPL-3.0)
# =====================================================================
# Catatan: protokol UDP & handshake SAMA dengan Simple Voice Chat biasa,
# jadi client SVC standar tetap bisa connect tanpa ganti mod.
# Buka port UDP 'network.port' di firewall agar voice chat berfungsi.
# Dokumen lengkap: docs/IMPLEMENTATION_PLAN.md & docs/PROTOCOL_REFERENCE.md
#
# File ini DIJAGA OTOMATIS oleh plugin:
#  - corrupt  -> di-backup ke config.yml.corrupt-<waktu>, lalu dibuat ulang.
#  - outdated -> nilai kamu dipertahankan, key baru ditambah, file lama
#                di-backup ke config.yml.bak-<waktu>.
# =====================================================================

# Versi struktur config. JANGAN diubah manual - dipakai auto-migrasi.
config_version: 2

# ---------------------------------------------------------------------
# Jaringan & protokol (JANGAN diubah kecuali tahu konsekuensinya)
# ---------------------------------------------------------------------
network:
  # Port UDP untuk voice chat. Default SVC = 24454.
  # -1 = pakai port Minecraft server (TIDAK disarankan, bentrok query UDP).
  port: 24454
  # IP bind. Kosongkan = pakai server-ip server.properties. "*" = wildcard.
  bind_address: ""
  # Host yang dikirim ke client untuk connect. Kosong = otomatis.
  # Bisa host:port, contoh "voice.contoh.com:24454"
  voice_host: ""
  # MTU maksimum paket audio (byte). 512-2048.
  mtu_size: 1275
  # Rate limit paket plugin-channel per detik per player. -1 = nonaktif.
  tcp_rate_limit: 16
  # Interval keepalive (ms). Timeout = keep_alive * 10.
  keep_alive: 1000
  # Waktu tunggu cek mod terpasang (ms). Hanya jika force_voice_chat=true.
  login_timeout: 10000
  # Balas ping eksternal (untuk server list / monitoring).
  allow_pings: true

# ---------------------------------------------------------------------
# Codec & kualitas audio
# ---------------------------------------------------------------------
audio_quality:
  # Opus codec. Pilihan: VOIP, AUDIO, RESTRICTED_LOWDELAY
  codec: VOIP
  # Bitrate Opus (kbps). 6-510. 64 = standar VOIP jernih.
  opus_bitrate: 64
  # Sample rate internal (Hz). JANGAN diubah, client mengharapkan 48000.
  sample_rate: 48000
  # Ukuran frame (ms). 20 = standar SVC (960 sample). JANGAN diubah.
  frame_size_ms: 20
  # Izinkan player record voice chat.
  allow_recording: true

# ---------------------------------------------------------------------
# Range suara
# ---------------------------------------------------------------------
voice_range:
  # Jarak normal suara terdengar (block). 1-1000000.
  voice_range: 48
  # Jarak saat bisik (block).
  whisper_range: 4
  # Jarak maksimum saat "teriak" (block). Bisa > voice_range.
  # Butuh permission 'shout_permission' untuk mencapai batas ini.
  shout_range: 96
  # Permission untuk diizinkan range di atas voice_range (teriak).
  # Default true = semua player. Set 'astolfo.shout' untuk batasi.
  shout_permission: astolfo.shout
  # Aktifkan range dinamis berbasis kekuatan suara (RMS).
  # false = whisper/normal binary seperti SVC biasa.
  # true = jarak menyesuaikan: bisik kecil, teriak jauh.
  dynamic_range_enabled: true
  # Ambang dB untuk dianggap bisik (lebih pelan = lebih kecil jarak).
  loudness_whisper_db: -45.0
  # Ambang dB untuk dianggap teriak (mencapai shout_range).
  loudness_shout_db: -15.0
  # Range broadcast paket audio (block). <0 = voice_range + 1.
  # Server kirim paket ke player dalam radius ini; attenuation akhir di client.
  broadcast_range: -1
  # Batas atas override range per-player via API/command.
  max_player_range_override: 1000000
  # Threshold (relative ke whisper_range) untuk set ikon bisik di client.
  # distance < whisper_range * factor -> whispering=true.
  whisper_icon_threshold_factor: 1.5

# ---------------------------------------------------------------------
# Grup
# ---------------------------------------------------------------------
groups:
  enable_groups: true

# ---------------------------------------------------------------------
# Spectator
# ---------------------------------------------------------------------
spectator:
  # Spectator bisa bicara ke player biasa.
  spectator_interaction: false
  # Spectator bisa bicara ke player yang dipossess-nya.
  spectator_player_possession: false

# ---------------------------------------------------------------------
# Force voice chat
# ---------------------------------------------------------------------
force_voice_chat: false

# ---------------------------------------------------------------------
# Noise cancellation (server-side)
# ---------------------------------------------------------------------
# PENTING: NC server-side efektif HANYA jika sound_physics.tier = TIER_2,
# karena butuh decode->proses->re-encode. Pada TIER_1, noise suppression
# memakai bawaan client SVC (hemat CPU server).
noise_cancellation:
  # Aktifkan noise suppression pada PCM sebelum re-broadcast (butuh TIER_2).
  enabled: false
  # Engine:
  #  SPECTRAL = spectral subtraction adaptif pure-Java (default, tanpa native lib).
  #             Bagus untuk hum kipas / hiss / noise stasioner.
  #  GATE     = noise gate ringan (paling murah, hanya potong lantai noise).
  #  RNNOISE  = neural net native (roadmap; sekarang otomatis fallback SPECTRAL).
  engine: SPECTRAL
  # Agresivitas pengurangan noise (0.0 lembut - 1.0 maksimal).
  strength: 0.7
  # Hanya proses speaker aktif (RMS di atas threshold) untuk hemat CPU.
  skip_silent_frames: true
  silent_threshold_db: -50.0

# ---------------------------------------------------------------------
# Sound physics (raytrace)
# ---------------------------------------------------------------------
sound_physics:
  # Aktifkan simulasi fisika suara berbasis raytrace.
  enabled: true
  # Tier simulasi.
  # TIER_1 = occlusion + modulasi distance (murah, default).
  # TIER_2 = TIER_1 + PCM DSP bake (low-pass muffle + reverb + NC). Mahal, opt-in.
  tier: TIER_1
  # Lakukan raytrace occlusion (apakah tertutup?).
  raytrace: true
  # Raytrace langsung async (true) atau via main-thread cache tick (false, aman default).
  # true lebih cepat tapi uji stabilitas di Paper-mu dulu.
  async_raytrace: false
  # Maksimum block solid yang ditembus sebelum suara tidak tembus dinding
  # sama sekali (difraksi lewat celah masih dihitung).
  max_occlusion_blocks: 8
  # Penalti jarak per block solid yang ditembus (block). Mensimulasikan "mendam".
  occlusion_penalty_per_block: 6.0
  # Kekuatan difraksi: suara membungkung di tepi obstacle (0.0-2.0).
  # 1.0 = natural. 0.0 = matikan probe difraksi (hemat CPU, dinding jadi keras).
  diffraction_strength: 1.0
  # Kekuatan redaman transmisi dinding (0.0-2.0). 1.0 = natural.
  # 0.0 = dinding tidak meredam sama sekali.
  transmission_strength: 1.0
  # Kekuatan muffle medium air/lava (0.0-2.0). 1.0 = natural.
  medium_strength: 1.0
  # Smoothing hasil physics per pasangan pembicara-pendengar (0.05-1.0).
  # Kecil = transisi sangat halus saat lewat tepi obstacle; 1.0 = tanpa smoothing.
  smoothing_factor: 0.35
  # Radius probe untuk deteksi ruang tertutup (reverb/echo).
  reverb_probe_radius: 6
  # Penalti distance saat listener berada di ruang tertutup (Tier 1 simulasi gema).
  reverb_penalty: 4.0
  # Cache hasil raytrace per pasangan selama N tick (50ms tiap tick).
  # Naikkan untuk hemat CPU, turunkan untuk akurasi.
  cache_ticks: 2
  # Saat TIER_2: cutoff low-pass default untuk muffle (Hz) bila physics tidak
  # memberi cutoff spesifik. Lebih rendah = lebih mendam.
  muffle_lowpass_hz: 1200
  # Saat TIER_2: gain reverb (0.0-1.0). Menskala density ruangan ke jumlah gema.
  reverb_gain: 0.25
  # Saat TIER_2: decay reverb / RT60 (detik). Besar = gema panjang (aula/gua).
  reverb_decay_seconds: 1.2
  # World yang mendapat TIER_2 (kosong = semua world jika tier=TIER_2).
  tier2_worlds: []
  # Bypass physics untuk grup (group chat tetap jernih seperti SVC).
  bypass_for_groups: true

# ---------------------------------------------------------------------
# Audio playback (mp3/ogg/wav via command /av play)
# ---------------------------------------------------------------------
audio:
  # Aktifkan fitur playback.
  enabled: true
  # Folder file audio (relatif terhadap folder plugin).
  folder: audio
  # Ekstensi yang dicoba saat resolve nama file tanpa ekstensi.
  formats: [mp3, ogg, wav]
  # Volume default playback (0.0-1.0).
  default_volume: 1.0
  # Distance default untuk locational playback.
  default_distance: 32
  # Maksimum playback concurrent di seluruh server.
  max_concurrent_playbacks: 64
  # Kualitas resampler. LOW (linear), MEDIUM (lanczos-8), HIGH (lanczos/sinc-16).
  resample_quality: HIGH
  # Normalize peak playback agar tidak clipping.
  normalize: true
  # Default PrivateChannelOptions untuk API bila caller tidak memberi options.
  private_channel:
    # Jika false: hanya anggota channel dengar (range tak terbatas antar anggota).
    # Jika true: anggota + orang dalam 'range' block dengar.
    default_audible_nearby: false
    default_range: -1

# ---------------------------------------------------------------------
# Async & performa
# ---------------------------------------------------------------------
performance:
  # Gunakan virtual thread (Java 21+/25) untuk packet processing & DSP.
  virtual_threads: true
  # Ukuran pool DSP (0 = virtual thread unlimited). Untuk platform thread, set >0.
  dsp_pool_size: 0
  # Ukuran pool Opus decoder/encoder (threadlocal reuse, batasi memori).
  opus_pool_size: 32
  # Drop paket kedaluwarsa (TTL) tanpa proses.
  drop_expired_packets: true
  # Log warning overload tiap berapa ms (0 = selalu).
  overload_log_cooldown_ms: 5000
  # Bounded queue DSP (frame). -1 = unbounded. Naikkan = resistan burst, risiko latency.
  dsp_queue_capacity: 1024

# ---------------------------------------------------------------------
# Integrasi
# ---------------------------------------------------------------------
integration:
  # PlaceholderAPI expansion %astolfo_*% (soft-depend, aktif bila PAPI terpasang).
  placeholderapi:
    enabled: true
  # Ekspose API publik ke plugin lain via ServicesManager (AstolfoApi).
  # Denizen/Skript/plugin lain hook lewat API ini.
  public_api: true

# ---------------------------------------------------------------------
# Kompatibilitas multi-versi client
# ---------------------------------------------------------------------
compatibility:
  # Versi protokol utama (SVC saat ini = 20).
  default_compatibility_version: 20
  # Izinkan adapter versi legacy (true = aktifkan registry per-versi; roadmap).
  allow_legacy_adapters: true
  # Tolak client versi tidak dikenal (false = coba fallback ke default).
  reject_unknown_version: false

# ---------------------------------------------------------------------
# Debug
# ---------------------------------------------------------------------
debug:
  enabled: false
  # Log paket (sangat verbose).
  log_packets: false
  # Log timing DSP Tier 2 per frame (verbose).
  log_dsp_timing: false
  # Log hasil raytrace/physics per pasangan (sangat verbose).
  log_raytrace: false
