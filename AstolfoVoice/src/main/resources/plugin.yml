name: AstolfoVoice
version: ${project.version}
main: id.astolfo.voicechat.AstolfoVoice
api-version: '1.21'
authors: [Mizu]
description: Proximity voice chat kompatibel protokol Simple Voice Chat, dengan sound physics raytrace, noise cancellation server-side, range dinamis, dan playback audio mp3/ogg/wav.
website: https://github.com/Mizu-ID/Astolfo
load: STARTUP
softdepend:
  - PlaceholderAPI
  - denizen
  - Skript
commands:
  astolfovoice:
    description: Perintah utama AstolfoVoice
    usage: |
      /astolfovoice play <file> player <player1> <player2> ... [volume] [pitch=P] [preset=PHONE]
      /astolfovoice play <file> world <world> [volume] [pitch=P] [preset=PHONE]
      /astolfovoice play <file> all [volume] [pitch=P] [preset=PHONE]
      /astolfovoice play <file> location <world> <x> <y> <z> [distance] [volume] [pitch=P] [preset=PHONE]
      /astolfovoice play <file> group <group>
      /astolfovoice stop [all | player <name>]
      /astolfovoice list
      /astolfovoice voicerange <player> [range]
      /astolfovoice status [player]
      /astolfovoice reset <player>
      /astolfovoice reload
      /astolfovoice playlist create <name>
      /astolfovoice playlist add <name> <file> [file ...]
      /astolfovoice playlist remove <name> <file>
      /astolfovoice playlist play <name> [player <p1> <p2> ... | world <w> | all] [shuffle]
      /astolfovoice playlist list [name]
      /astolfovoice playlist delete <name>
      /astolfovoice playlist shuffle <name>
      Preset: NONE, PHONE, RADIO, MEGA, CAVE. pitch=1.0 normal.
    aliases: [asv, av, astolfo]
    permission: astolfo.command
    permission-message: Kamu tidak punya izin untuk perintah ini.
permissions:
  astolfo.command:
    default: true
  astolfo.admin:
    default: op
    children:
      astolfo.command: true
      astolfo.play: true
      astolfo.stop: true
      astolfo.list: true
      astolfo.voicerange: true
      astolfo.status: true
      astolfo.reset: true
      astolfo.reload: true
      astolfo.playlist: true
  astolfo.play:
    default: op
  astolfo.stop:
    default: op
  astolfo.list:
    default: true
  astolfo.voicerange:
    default: op
  astolfo.status:
    default: true
  astolfo.reset:
    default: op
  astolfo.reload:
    default: op
  astolfo.playlist:
    default: op
  astolfo.shout:
    default: true
  astolfo.speak:
    default: true
  astolfo.listen:
    default: true
